<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding-top: 100px;
        }

        input {
            padding: 10px;
            margin: 10px;
            width: 200px;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
        }

        .error {
            color: red;
        }
    </style>
</head>

<body>

<div>
    <h2>Login</h2>

    <!-- Spring Security login -->
    <form method="post" action="/login">

        <!-- CSRF -->
        <input type="hidden"
               name="${_csrf.parameterName}"
               value="${_csrf.token}"/>

        <!-- Username -->
        <label for="username">Username</label><br>
        <input id="username"
               name="username"
               required
               autofocus/><br>

        <!-- Password -->
        <label for="password">Password</label><br>
        <input id="password"
               type="password"
               name="password"
               required/><br>

        <!-- Remember me -->
        <label>
            <input type="checkbox" name="remember-me">
            Remember me
        </label><br><br>

        <button type="submit">Login</button>
    </form>

    <!-- Feedback via redirect params -->
    <p class="error">
        <script>
            const params = new URLSearchParams(window.location.search);
            if (params.has("error")) {
                console.log("Invalid username or password");
            }
            if (params.has("logout")) {
                console.log("You have been logged out");
            }
        </script>
    </p>
</div>

</body>
</html>
