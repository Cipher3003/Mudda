# ========== PostgreSQL Configuration ==========
spring.datasource.url=${POSTGRES_URL}
spring.datasource.username=${POSTGRES_USERNAME}
spring.datasource.password=${POSTGRES_PASSWORD}

# Hibernate JPA settings
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Re-adding the dialect explicitly as the inference seems to be failing in your setup
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Disables select before insert
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# Don't know what these below do so commented
#spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
#spring.jpa.properties.hibernate.generate_statistics=true

# Disable open-in-view to prevent potential performance issues and unexpected behavior in production
spring.jpa.open-in-view=false

# ========== Server ==========
server.port=8080
server.tomcat.connection-timeout=10s
#TODO: improve timeout handling
server.error.include-stacktrace=never

# ========== Logging ==========
logging.level.org.springframework=INFO
logging.level.org.springframework.security=INFO
logging.level.com.mudda=INFO
logging.file.path=logs
logging.file.name=/var/log/mudda

# ========== Amazon S3 Bucket ==========
amazon.s3.bucket-name=${AWS_BUCKET_NAME}
amazon.s3.region=${AWS_REGION}
amazon.s3.access-key=${AWS_ACCESS_KEY_ID}
amazon.s3.secret-key=${AWS_SECRET_ACCESS_KEY}

# ========== Security ==========
security.jwt.secret-key=${JWT_SECRET_KEY}
security.jwt.access-ttl-min=${JWT_ACCESS_TTL}
security.jwt.refresh-ttl-days=${JWT_REFRESH_TTL}

# ========== Mail ==========
spring.mail.host=${MAIL_PROVIDER}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}

# ========== App ==========
app.frontend-base-url=http://Mudda-backend-env.eba-p7eppepp.ap-south-1.elasticbeanstalk.com

app.rate-limit.auth-capacity=20
app.rate-limit.auth-refill-tokens=10
app.rate-limit.auth-refill-minutes=1

app.cors.allowed-origins=https://www.mudda.dev,https://mudda-frontend.vercel.app

app.session.key=${REMEMBER_ME_KEY}
